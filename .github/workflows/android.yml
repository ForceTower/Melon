name: Android

on:
  push:
    branches: [main]
    paths:
      - "apps/android/**"
      - "packages/shared-kmp/**"
      - "build-logic/**"
      - "gradle/**"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "apps/android/**"
      - "packages/shared-kmp/**"
      - "build-logic/**"
      - "gradle/**"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android.yml"
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Assemble + test + lint
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Never `build`/`check`: they pull in the KMP iOS targets, which can't compile on Linux.
      - name: Assemble release + run unit tests
        run: >-
          ./gradlew
          :apps:android:app:assembleRelease
          testDebugUnitTest
          jvmTest
          --stacktrace

      - name: Android Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: "**/build/reports/lint-results-*.html"
          if-no-files-found: ignore
